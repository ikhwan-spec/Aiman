<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltEdge Powerbank | Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; line-height: 1.6; }
        header { position: fixed; top: 0; left: 0; width: 100%; background: #0f172a; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; z-index: 1000; }
        .logo-container img { height: 40px; }
        nav a { color: #94a3b8; text-decoration: none; margin-left: 2rem; font-weight: 500; }
        nav a.active, nav a:hover { color: #38bdf8; }
        .page { min-height: 100vh; padding: 120px 5% 80px 5%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h2 { font-size: 2.5rem; text-align: center; margin-bottom: 1rem; }
        p { color: #94a3b8; max-width: 600px; text-align: center; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; width: 100%; max-width: 1000px; }
        .card { background-color: #1e293b; padding: 4rem 2rem; border-radius: 12px; text-align: center; border: 1px solid #334155; color: #38bdf8; }
        footer { background-color: #020617; text-align: center; padding: 2rem; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo-container"><img src="logo.png" alt="VoltEdge Logo" onerror="this.style.display='none'; this.parentNode.innerHTML='⚡ VoltEdge';"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="features.html">Features</a>
            <a href="gallery.html" class="active">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="page">
        <h2>In The Wild</h2>
        <p>See how VoltEdge fits seamlessly into smart transit, outdoor adventures, and everyday workflows.</p>
        
        <div class="grid">
            <div class="card"><p>📸 [Image: Commuting on a Train]</p></div>
            <div class="card"><p>📸 [Image: Workspace at a Café]</p></div>
            <div class="card"><p>📸 [Image: Outdoor Trail Navigation]</p></div>
        </div>
    </main>

    <footer><p>&copy; 2026 VoltEdge Technologies.</p></footer>
</body>
</html>
